<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <style>
      .bg { fill:#1b1235; }
      .body { fill:#4e3a86; }
      .ear { fill:#4e3a86; }
      .inner { fill:#f4b7b0; }
      .eye { fill:#1b1235; }
      .sn1 { fill:#f6e6cc; }
      .sn2 { fill:#f1b19f; }
      .whisk { stroke:#ffffff; stroke-width:8; stroke-linecap:round; opacity:.9; }
    </style>
  </defs>
  <!-- bg -->
  <circle class="bg" cx="256" cy="256" r="256"/>


  <!-- ears -->
  <polygon class="ear" points="170,110 140,170 210,150"/>
  <polygon class="ear" points="342,110 372,170 302,150"/>

  <polygon class="inner" points="170,125 152,160 198,148"/>
  <polygon class="inner" points="342,125 360,160 314,148"/>

  <!-- controller body -->
  <path class="body"
    d="
      M90 220
      C60 250,60 340,120 380
      C170 410,210 370,256 370
      C302 370,342 410,392 380
      C452 340,452 250,422 220
      C392 190,350 210,320 230
      C300 244,280 250,256 250
      C232 250,212 244,192 230
      C162 210,120 190,90 220
    "/>

  <!-- eyes -->
  <circle class="eye" cx="190" cy="280" r="26"/>
  <circle class="eye" cx="322" cy="280" r="26"/>

  <!-- whiskers -->
    <!-- whiskers -->
  <line class="whisk" x1="220" y1="320" x2="150" y2="305"/>
  <line class="whisk" x1="220" y1="335" x2="150" y2="335"/>

  <line class="whisk" x1="292" y1="320" x2="362" y2="305"/>
  <line class="whisk" x1="292" y1="335" x2="362" y2="335"/>

  <!-- buttons as snout -->
  <circle class="sn1" cx="256" cy="312" r="10"/>
  <circle class="sn1" cx="272" cy="328" r="10"/>
  <circle class="sn2" cx="256" cy="344" r="10"/>
  <circle class="sn2" cx="240" cy="328" r="10"/>
</svg>
